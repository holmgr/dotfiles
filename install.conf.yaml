- clean: ['~']

- link:
    ~/.vim: vim/
    ~/.vimrc: vim/vimrc
    ~/.tmux: tmux/
    ~/.tmux.conf: tmux/tmux.conf
    ~/.tmux.conf.local: tmux/tmux.conf.local

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - ["git clone https://github.com/VundleVim/Vundle.vim.git ~/.vim/bundle/Vundle.vim", Adding vundle]
